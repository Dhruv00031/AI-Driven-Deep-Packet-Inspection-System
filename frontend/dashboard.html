<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>

        AI DPI Dashboard

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">


     <!-- Bootstrap Icons-->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Main CSS -->

    <link
        rel="stylesheet"
        href="assets/css/main.css">

    <!-- Dashboard CSS -->

    <link
        rel="stylesheet"
        href="assets/css/dashboard.css">

    <!-- Sidebar CSS -->

    <link
        rel="stylesheet"
        href="assets/css/sidebar.css">

    <!-- Navbar CSS -->

    <link
        rel="stylesheet"
        href="assets/css/navbar.css">

</head>

<body>

<!-- ======================================================
     Main Wrapper
====================================================== -->

<div class="dashboard-wrapper">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h3 class="logo">

            AI DPI

        </h3>

        <ul>

            <li class="active">

                <a href="dashboard.html">

                    Dashboard

                </a>

            </li>

            <li>

                <a href="packets.html">

                    Packets

                </a>

            </li>

            <li>

                <a href="alerts.html">

                    Threats

                </a>

            </li>

            <li>

                <a href="analytics.html">

                    Analytics

                </a>

            </li>

            <li>

                <a href="settings.html">

                    Settings

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Navbar -->

        <nav class="top-navbar">

            <!-- Left Side -->

            <h2>

                Dashboard

            </h2>

            <!-- Right Side -->

            <div class="nav-right">

                <!-- Search -->

                <input
                    type="text"
                    class="search-box"
                    placeholder="Search Packet ID...">

                <!-- Notification -->

                <div class="notification">

                    <i class="bi bi-bell-fill"></i>

                </div>

                <!-- User -->

                <div class="user-profile">

                    <div class="user-avatar">

                        D

                    </div>

                    <div class="user-name">

                        Dhruv

                    </div>

                </div>

            </div>

        </nav>

        <!-- Dashboard Cards -->

        
        <section class="cards-container">

            <!-- Total Packets -->

            <div class="dashboard-card">

                <div class="card-icon packet-icon">

                    <i class="bi bi-box-seam-fill"></i>

                </div>

                <div class="card-content">

                    <h5>

                        Total Packets

                    </h5>

                    <h2 id="totalPackets">

                        0

                    </h2>

                </div>

            </div>


            <!-- Safe Packets -->

            <div class="dashboard-card">

                <div class="card-icon safe-icon">

                    <i class="bi bi-shield-check"></i>

                </div>

                <div class="card-content">

                    <h5>

                        Safe Packets

                    </h5>

                    <h2 id="safePackets">

                        0

                    </h2>

                </div>

            </div>


            <!-- Threat Packets -->

            <div class="dashboard-card">

                <div class="card-icon threat-icon">

                    <i class="bi bi-bug-fill"></i>

                </div>

                <div class="card-content">

                    <h5>

                        Threat Packets

                    </h5>

                    <h2 id="attackPackets">

                        0

                    </h2>

                </div>

            </div>


            <!-- TCP Packets -->

            <div class="dashboard-card">

                <div class="card-icon tcp-icon">

                    <i class="bi bi-hdd-network-fill"></i>

                </div>

                <div class="card-content">

                    <h5>

                        TCP Packets

                    </h5>

                    <h2 id="tcpPackets">

                        0

                    </h2>

                </div>

            </div>

        </section>
        <!-- Recent Packets -->

        <section class="table-section">

            <h3>

                Recent Packets

            </h3>

            <table
                class="table table-dark table-hover">

                <thead>

                <tr>

                    <th>

                        Packet ID

                    </th>

                    <th>

                        Source

                    </th>

                    <th>

                        Destination

                    </th>

                    <th>

                        Status

                    </th>

                </tr>

                </thead>

                <tbody id="packetTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- Bootstrap -->

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

<!-- Dashboard JS -->

<!-- API Layer -->
<script src="js/api.js"></script>

<!-- Dashboard Logic -->
<script src="js/dashboard.js"></script>

</body>

</html>
